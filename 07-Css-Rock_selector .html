<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      body{
        background-color: rgb(25, 25, 25);
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }
      .mainp{
        font-size: 25px;
        font-weight: bold;

      }
      .move-icon
      {
        height: 50px;
        
      }
      .mb{
        background-color: transparent;
        width: 120px;
        height: 120px;
        margin-right: 10px;
        border: 2px solid white;
        border-color: white;
        border-radius: 100%;
      }
      .Result
      {
        font-size: 25px;
        font-weight: bold;
        margin-top:50px ;
      }

    </style>
  </head>
  <body>
    <p class="mainp">Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    "
    class="mb"
    ><img src="Rock_paper_sccisor/Rock.png" class="move-icon">
    </button>

    <button onclick="
      playGame('paper');
    "class="mb"
>
    <img src="Rock_paper_sccisor/Paper.png "class="move-icon">
    </button>

    <button onclick="
      playGame('scissors');
    "class="mb"
>
    <img src="Rock_paper_sccisor/Sccisor.png"class="move-icon">
    </button>
    <p class="Result">
      Start
    </p>
    <button onclick="
      resetScore();
      localStorage.removeItem('score');
      
    "style="font-family:Arial;">
      Reset Score
    </button>

    <script>

      let score =JSON.parse(localStorage.getItem('score')) || {
        win: 0,
        lose: 0,
        ties: 0,
        
      };
     

      console.log(JSON.parse(localStorage.getItem('score')));

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') {
            result = 'You lose.';
            score.lose+=1;

          } else if (computerMove === 'paper') {
            result = 'You win.';
            score.win+=1;
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
            score.ties+=1
          }


        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') {
            result = 'You win.';
            score.win+=1;
          } else if (computerMove === 'paper') {
            result = 'Tie.';
            score.ties+=1
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
            score.lose+=1;
          }
          
        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') {
            result = 'Tie.';
            score.ties+=1
          } else if (computerMove === 'paper') {
            result = 'lose.';
            score.lose+=1;
          } else if (computerMove === 'scissors') {
            result = 'win.';
            score.win+=1;
          }
          
        }

        localStorage.setItem('score',JSON.stringify(score)); 
        
        document.querySelector('.Result').innerHTML=`You ${result} <br> You ${playerMove} - Computer ${computerMove}<br>Victory :: ${score.win} &nbsp; Lost :: ${score.lose} &nbsp; Ties :: ${score.ties}`;

        // alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}\n Win : ${score.win}\t Lose: ${score.lose}\t Ties : ${score.ties}`);
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }

        return computerMove;
      }
      
      function resetScore()
      {
        score.win=0;
        score.lose=0;
        score.ties=0;

        document.querySelector('.Result').innerHTML=`Score Resets<br>Victory :: ${score.win} &nbsp; Lost :: ${score.lose} &nbsp; Ties :: ${score.ties}`;

        // alert("Scores are Reset");
      }
    </script>
  </body>
</html>
