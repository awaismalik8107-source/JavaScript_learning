<!DOCTYPE html>
<html>

  <head>
    <title>

      Advance Function

    </title>

  </head>
  <body>

 
    <script>
      setTimeout(function(){
        console.log('Hello');
        console.log('0');
      
      },3000);
      console.log('hello');

      // but the next line will apear before it and hence called asyn;

      setInterval(function(){
        console.log('Hello');
        console.log('0');
      
      },3000);

      console.log('next line');
    </script>

  </body>


</html>
